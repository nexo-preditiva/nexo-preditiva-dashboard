<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Relatórios-NEXO PREDITIVA</title><script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';import{getAuth,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';import{getFirestore,collection,query,getDocs}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';const app=initializeApp({apiKey:"AIzaSyBjZmY3fL-Jy19CJ5w-pNv06e4sTqmO5RE",authDomain:"studio-8906801948-ecb0a.firebaseapp.com",projectId:"studio-8906801948-ecb0a",storageBucket:"studio-8906801948-ecb0a.firebasestorage.app",messagingSenderId:"195954628052",appId:"1:195954628052:web:8bb933952efd108e13b241"});const auth=getAuth(app),db=getFirestore(app);onAuthStateChanged(auth,u=>{if(!u)window.location.href='/';else{document.getElementById('user').textContent=u.displayName||u.email;loadMetrics()}});async function loadMetrics(){const snap=await getDocs(query(collection(db,'leads')));let total=0,fechado=0,receita=0;const stats={novo:0,abordagem:0,negociacao:0,fechado:0,cancelado:0};snap.forEach(d=>{const l=d.data();total++;const st=(l.status||'novo').toLowerCase();stats[st]=(stats[st]||0)+1;if(st==='fechado'){fechado++;receita+=(l.valor_fechado||0)}});const taxa=(total>0?(fechado/total*100).toFixed(1):0),ticket=(fechado>0?(receita/fechado).toFixed(2):0),roi=((receita/997)*100).toFixed(1);document.getElementById('total').textContent=total;document.getElementById('taxa').textContent=taxa+'%';document.getElementById('receita').textContent='R$ '+receita.toLocaleString('pt-BR');document.getElementById('roi').textContent=roi+'%';document.getElementById('ticket').textContent='R$ '+ticket;['novo','abordagem','negociacao','fechado','cancelado'].forEach(st=>{const pct=(total>0?(stats[st]/total*100).toFixed(0):0);document.getElementById('f-'+st).style.width=pct+'%';document.getElementById('f-'+st).textContent=stats[st]||0})}window.logout=()=>signOut(auth).then(()=>window.location.href='/');</script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0f1e;color:#e5ecff;padding:2rem}.hd{display:flex;justify-content:space-between;margin-bottom:2rem;padding:1rem;background:#0f172a;border-radius:8px}.hd h1{font-size:1.5rem;color:#2563eb}.hd button{background:#ef4444;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:2rem}.metric{background:#0f172a;padding:1.5rem;border-radius:8px;text-align:center}.metric h3{font-size:.9rem;color:#94a3b8;margin-bottom:.5rem}.metric p{font-size:2rem;color:#2563eb;font-weight:700}.funil{background:#0f172a;padding:2rem;border-radius:8px;margin-bottom:2rem}.funil h2{font-size:1.2rem;margin-bottom:1.5rem}.stage{margin-bottom:1rem}.stage-label{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.875rem;color:#94a3b8}.bar{background:#1e293b;border-radius:4px;overflow:hidden;height:32px}.bar-fill{background:linear-gradient(90deg,#2563eb,#3b82f6);height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.875rem;transition:width .3s}</style></head><body><div class="hd"><h1>NEXO PREDITIVA|Relatórios</h1><div><span id="user"></span> <button onclick="logout()">Sair</button></div></div><div class="metrics"><div class="metric"><h3>Total de Leads</h3><p id="total">0</p></div><div class="metric"><h3>Taxa de Conversão</h3><p id="taxa">0%</p></div><div class="metric"><h3>Receita Fechada</h3><p id="receita">R$ 0</p></div><div class="metric"><h3>ROI</h3><p id="roi">0%</p></div><div class="metric"><h3>Ticket Médio</h3><p id="ticket">R$ 0</p></div></div><div class="funil"><h2>Funil de Conversão</h2><div class="stage"><div class="stage-label"><span>NOVO</span></div><div class="bar"><div class="bar-fill" id="f-novo" style="width:0%">0</div></div></div><div class="stage"><div class="stage-label"><span>ABORDAGEM</span></div><div class="bar"><div class="bar-fill" id="f-abordagem" style="width:0%">0</div></div></div><div class="stage"><div class="stage-label"><span>NEGOCIAÇÃO</span></div><div class="bar"><div class="bar-fill" id="f-negociacao" style="width:0%">0</div></div></div><div class="stage"><div class="stage-label"><span>FECHADO</span></div><div class="bar"><div class="bar-fill" id="f-fechado" style="width:0%">0</div></div></div><div class="stage"><div class="stage-label"><span>CANCELADO</span></div><div class="bar"><div class="bar-fill" id="f-cancelado" style="width:0%">0</div></div></div></div></body></html>
