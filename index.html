<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXO PREDITIVA - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading" class="loading">Carregando...</div>

  <!-- Login -->
  <div id="loginContainer" class="login-container" style="display:none">
    <div class="login-box">
      <h1>🚀 NEXO PREDITIVA</h1>
      <p>Sistema de Gestão de Leads</p>
      <button id="googleLoginBtn" class="btn-google">Entrar com Google</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard" style="display:none">
    <header>
      <h1>NEXO PREDITIVA</h1>
      <div class="user-info">
        <span id="userName"></span>
        <button id="logoutBtn">Sair</button>
      </div>
    </header>
    <main>
      <div class="stats">
        <div class="stat-card">
          <h3>Leads Hoje</h3>
          <p id="leadsToday">0</p>
        </div>
        <div class="stat-card">
          <h3>Total do Mês</h3>
          <p id="leadsMonth">0</p>
        </div>
        <div class="stat-card">
          <h3>Taxa de Conversão</h3>
          <p id="conversionRate">0%</p>
        </div>
      </div>
      <div class="leads-container">
        <h2>Seus Leads</h2>
        <div id="leadsList" class="leads-list"></div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js?v=3"></script>
</body>
</html>
