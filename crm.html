<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CRM-NEXO PREDITIVA</title><script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';import{getAuth,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';import{getFirestore,collection,query,onSnapshot}from'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';const app=initializeApp({apiKey:"AIzaSyBjZmY3fL-Jy19CJ5w-pNv06e4sTqmO5RE",authDomain:"studio-8906801948-ecb0a.firebaseapp.com",projectId:"studio-8906801948-ecb0a",storageBucket:"studio-8906801948-ecb0a.firebasestorage.app",messagingSenderId:"195954628052",appId:"1:195954628052:web:8bb933952efd108e13b241"});const auth=getAuth(app),db=getFirestore(app);onAuthStateChanged(auth,u=>{if(!u)window.location.href='/';else{document.getElementById('user').textContent=u.displayName||u.email;loadLeads()}});function loadLeads(){onSnapshot(query(collection(db,'leads')),s=>{['novo','abordagem','negociacao','fechado','cancelado'].forEach(st=>document.getElementById(st).innerHTML='');s.forEach(d=>{const l=d.data(),st=(l.status||'novo').toLowerCase(),col=document.getElementById(st);if(col){const c=document.createElement('div');c.className='card';c.innerHTML=`<b>${l.nome||'Sem nome'}</b><br><small>${l.empresa||''}</small><br><small>${l.telefone||''}</small>`;col.appendChild(c)}})})}window.logout=()=>signOut(auth).then(()=>window.location.href='/');</script><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0f1e;color:#e5ecff}.hd{background:#0f172a;padding:1rem 2rem;display:flex;justify-content:space-between;border-bottom:1px solid #1e293b}.hd h1{font-size:1.5rem;color:#2563eb}.hd button{background:#ef4444;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer}.kb{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;padding:2rem;height:calc(100vh - 80px)}.col{background:#0f172a;border-radius:8px;padding:1rem}.col h3{margin-bottom:1rem;font-size:.9rem;text-transform:uppercase;color:#94a3b8}.card{background:#1e293b;padding:.75rem;border-radius:6px;margin-bottom:.5rem;font-size:.875rem;cursor:pointer}.card:hover{background:#334155}</style></head><body><div class="hd"><h1>NEXO PREDITIVA|CRM</h1><div><span id="user"></span> <button onclick="logout()">Sair</button></div></div><div class="kb"><div class="col"><h3>NOVO</h3><div id="novo"></div></div><div class="col"><h3>ABORDAGEM</h3><div id="abordagem"></div></div><div class="col"><h3>NEGOCIAÇÃO</h3><div id="negociacao"></div></div><div class="col"><h3>FECHADO</h3><div id="fechado"></div></div><div class="col"><h3>CANCELADO</h3><div id="cancelado"></div></div></div></body></html>
